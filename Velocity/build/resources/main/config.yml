  # false = befehle in der liste werden blockiert
  whitelist-mode: false

  message: "&c&lProxy &8» &7Dieser Befehl ist hier nicht erlaubt."

filters:
  - "server"
  - "glist"
  - "velocity"
  - "plugin"
  - ".*:.*"